<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artwork - My Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
    <script src="cursor-background.js"></script>
</head>
<body class="artwork-bg" style="background-image: url('images/background14.png'); background-repeat: repeat; background-size: 150%; background-position: center center;">
    <div class="container">
        <nav class="top-right-menu">
            <button class="nav-btn" onclick="window.location.href='index.html'" style="background: none; border: none; padding: 0;">
                <img src="images/home.png" alt="Home" style="height: 24px; vertical-align: middle;" oncontextmenu="return false;" draggable="false">
            </button>
            <button class="nav-btn" onclick="window.location.href='bio.html'" style="background: none; border: none; padding: 0;">
                <img src="images/bio.png" alt="Bio" style="height: 24px; vertical-align: middle;" oncontextmenu="return false;" draggable="false">
            </button>
            <button class="nav-btn" onclick="window.location.href='cv.html'" style="background: none; border: none; padding: 0;">
                <img src="images/cv.png" alt="CV" style="height: 24px; vertical-align: middle;" oncontextmenu="return false;" draggable="false">
            </button>
            <button class="nav-btn active" onclick="window.location.href='artwork.html'" style="background: none; border: none; padding: 0;">
                <img src="images/artwork.png" alt="Artwork" style="height: 24px; vertical-align: middle;" oncontextmenu="return false;" draggable="false">
            </button>
            <button class="nav-btn" onclick="window.location.href='poster.html'" style="background: none; border: none; padding: 0;">
                <img src="images/poster.png" alt="Poster" style="height: 24px; vertical-align: middle;" oncontextmenu="return false;" draggable="false">
            </button>
            <button class="nav-btn" onclick="window.location.href='music.html'" style="background: none; border: none; padding: 0;">
                <img src="images/music.png" alt="Music" style="height: 24px; vertical-align: middle;" oncontextmenu="return false;" draggable="false">
            </button>
        </nav>
        <main>
            <section class="artwork-section">
                <div class="gallery">
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <img src="artwork/artwork1.png" alt="Artwork 1" oncontextmenu="return false;" draggable="false">
                        <span style="color: #fff; font-size: 15pt; font-family: 'SDSamliphopangche_Basic', 'SDSanjo', sans-serif; font-weight: 400; margin-top: 12px;">
                            Eden's hair garden (2025)
                        </span>
                    </div>
                    <img src="images/art1.png" alt="Artwork 2" oncontextmenu="return false;" draggable="false">
                    <img src="images/art2.png" alt="Artwork 3" oncontextmenu="return false;" draggable="false">
                    <img src="images/art3.png" alt="Artwork 4" oncontextmenu="return false;" draggable="false">
                </div>
            </section>
        </main>
        <footer>
        </footer>
    </div>
</body>
</html>
