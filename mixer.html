<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mixer — Tone.js demo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="mixer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bubbler+One&display=swap" rel="stylesheet">
  <script src="cursor-background.js"></script>
</head>
<body class="main-bg">
  <div class="container">
    <div class="top-right-title"><a class="top-right-title-link" href="index.html" aria-label="Go to home">●◦∘◦Imgoldkim ●◌◌∘◦∘<span class="kr">금이다</span>∘◌∘</a></div>
    <nav class="top-right-menu">
      <a class="nav-link" href="info.html">Info</a>
      <a class="nav-link" href="work.html">Works</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </nav>
  </div>
  
  <main class="mixer-main">
    <div class="mixer-container">
      <div class="mixer-header">
        <h1>Mixer</h1>
      </div>
      
      <div class="mixer-controls">
        <div class="control-section">
          <button id="startAudio" class="mixer-btn">Start Audio</button>
          <button id="playSample" class="mixer-btn" disabled>Play Sample</button>
        </div>

        <div class="control-section">
          <label class="control-label">
            Oscillator Type
            <select id="oscType" class="mixer-select">
              <option value="sine">sine</option>
              <option value="square">square</option>
              <option value="sawtooth" selected>sawtooth</option>
              <option value="triangle">triangle</option>
            </select>
          </label>
        </div>

        <div class="control-section">
          <label class="control-label">
            Frequency: <span id="freqVal">440</span> Hz
            <input id="freq" type="range" min="50" max="5000" value="440" class="mixer-range">
          </label>
        </div>

        <div class="control-section">
          <label class="control-label">
            Gain: <span id="gainVal">0.5</span>
            <input id="gain" type="range" min="0" max="1" step="0.01" value="0.5" class="mixer-range">
          </label>
        </div>

        <div class="control-section">
          <label class="control-label">
            Filter: <span id="filterVal">1000</span> Hz
            <input id="filter" type="range" min="100" max="12000" value="1000" class="mixer-range">
          </label>
        </div>
      </div>

      <div class="canvas-wrap">
        <canvas id="viz" width="900" height="160"></canvas>
      </div>
    </div>
  </main>

  <script src="https://unpkg.com/tone@next/build/Tone.js"></script>
  <script src="mixer.js"></script>
</body>
</html>
