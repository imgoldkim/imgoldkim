<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mixer — Tone.js demo</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="mixer.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bubbler+One&display=swap" rel="stylesheet">
</head>
<body class="main-bg">
  <div class="container">
    <div class="top-right-title"><a class="top-right-title-link" href="index.html" aria-label="Go to home">●◦∘◦Imgoldkim ●◌◌∘◦∘<span class="kr">금이다</span>∘◌∘</a></div>
    <nav class="top-right-menu">
      <a class="nav-link" href="info.html">Info</a>
      <a class="nav-link" href="work.html">Work</a>
      <a class="nav-link" href="events.html">Events</a>
      <a class="nav-link" href="contact.html">Contact</a>
    </nav>
    <div class="header">
      <h1>Mixer — Tone.js demo</h1>
      <div>
        <button id="startAudio" class="small">Start Audio</button>
        <button id="playSample" class="small" disabled>Play Sample</button>
      </div>
    </div>

    <div class="controls">
      <div class="ctrl">
        <label>Oscillator Type</label>
        <select id="oscType">
          <option value="sine">sine</option>
          <option value="square">square</option>
          <option value="sawtooth" selected>sawtooth</option>
          <option value="triangle">triangle</option>
        </select>
        <label>Frequency: <span id="freqVal">440</span> Hz</label>
        <input id="freq" type="range" min="50" max="5000" value="440">
      </div>

      <div class="ctrl">
        <label>Gain: <span id="gainVal">0.5</span></label>
        <input id="gain" type="range" min="0" max="1" step="0.01" value="0.5">

        <label>Filter: <span id="filterVal">1000</span> Hz</label>
        <input id="filter" type="range" min="100" max="12000" value="1000">
      </div>

      <div class="ctrl">
        <label>Sample Player</label>
        <p style="color:#bbb; font-size:13px">Place your sample at <code>samples/sample.wav</code></p>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="viz" width="900" height="160"></canvas>
    </div>

    <p style="margin-top:18px; color:#bbb">This demo uses Tone.js (CDN). For production, consider bundling or pinning a version.</p>
  </div>

  <script src="https://unpkg.com/tone@next/build/Tone.js"></script>
  <script src="mixer.js"></script>
</body>
</html>
