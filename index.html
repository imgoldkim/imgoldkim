    <script>
        // Kick video playback; some browsers require an explicit play call.
        (function() {
            const video = document.querySelector('.hero-video');
            if (!video) return;
            const tryPlay = () => {
                video.play().catch(() => {});
            };
            document.addEventListener('DOMContentLoaded', tryPlay);
            document.addEventListener('click', tryPlay, { once: true });
        })();

        (function() {
            const widget = document.querySelector('.strudel-widget');
            const launcher = document.querySelector('.strudel-nav-trigger');
            const panel = document.querySelector('.strudel-widget-panel');
            if (!widget || !launcher || !panel) return;

            const setOpen = (isOpen) => {
                widget.classList.toggle('is-open', isOpen);
                launcher.setAttribute('aria-expanded', String(isOpen));
                panel.setAttribute('aria-hidden', String(!isOpen));
            };

            launcher.addEventListener('click', () => {
                setOpen(!widget.classList.contains('is-open'));
            });

            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    setOpen(false);
                }
            });
        })();
    </script>
