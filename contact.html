    <script>
        // EmailJS setup
        emailjs.init("YOUR_PUBLIC_KEY"); // You'll need to get this from EmailJS
        
        // Contact form handler
        const contactForm = document.getElementById('contactForm');
        
        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const formData = {
                    firstName: contactForm.querySelector('[name="firstName"]').value,
                    lastName: contactForm.querySelector('[name="lastName"]').value,
                    email: contactForm.querySelector('[name="email"]').value,
                    subject: contactForm.querySelector('[name="subject"]').value,
                    message: contactForm.querySelector('[name="message"]').value
                };

                try {
                    // Send email using EmailJS
                    await emailjs.send('service_YOUR_SERVICE_ID', 'template_YOUR_TEMPLATE_ID', {
                        to_email: 'imgoldkim@proton.me',
                        from_name: formData.firstName + ' ' + formData.lastName,
                        from_email: formData.email,
                        subject: formData.subject,
                        message: formData.message
                    });

                    // Show success message
                    alert(`Thank you, ${formData.firstName}! Your message has been sent to imgoldkim@proton.me`);
                    
                    // Clear form
                    contactForm.reset();
                } catch (error) {
                    console.error('Error sending email:', error);
                    alert('There was an error sending your message. Please try again.');
                }
            });
        }
    </script>

    <!-- Audio Player Script -->
    <script>
        // Simple Web Audio API player
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        let oscillator = null;
        let gainNode = null;
        let analyser = null;
        let animationId = null;

        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const canvas = document.getElementById('audioCanvas');
        const canvasCtx = canvas.getContext('2d');

        // Initialize audio nodes
        gainNode = audioContext.createGain();
        gainNode.gain.value = 0.3;
        gainNode.connect(audioContext.destination);

        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        gainNode.connect(analyser);

        // Play button
        playBtn.addEventListener('click', () => {
            if (oscillator === null) {
                oscillator = audioContext.createOscillator();
                oscillator.type = 'sine';
                oscillator.frequency.value = 440;
                oscillator.connect(gainNode);
                oscillator.start();
                playBtn.style.background = '#fff';
                playBtn.style.color = '#000';
                animate();
            }
        });

        // Pause button
        pauseBtn.addEventListener('click', () => {
            if (oscillator) {
                oscillator.stop();
                oscillator = null;
                playBtn.style.background = 'transparent';
                playBtn.style.color = '#fff';
                cancelAnimationFrame(animationId);
            }
        });

        // Stop button
        stopBtn.addEventListener('click', () => {
            if (oscillator) {
                oscillator.stop();
                oscillator = null;
                playBtn.style.background = 'transparent';
                playBtn.style.color = '#fff';
                canvasCtx.fillStyle = '#000';
                canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
                cancelAnimationFrame(animationId);
            }
        });

        // Volume control
        volumeSlider.addEventListener('input', (e) => {
            gainNode.gain.value = e.target.value / 100;
        });

        // Visualizer
        function animate() {
            animationId = requestAnimationFrame(animate);
            
            const dataArray = new Uint8Array(analyser.frequencyBinCount);
            analyser.getByteFrequencyData(dataArray);

            canvasCtx.fillStyle = '#000';
            canvasCtx.fillRect(0, 0, canvas.width, canvas.height);

            const barWidth = (canvas.width / dataArray.length) * 2.5;
            let barHeight;
            let x = 0;

            canvasCtx.fillStyle = '#00ff00';
            for (let i = 0; i < dataArray.length; i++) {
                barHeight = (dataArray[i] / 255) * canvas.height;
                canvasCtx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);
                x += barWidth + 1;
            }
        }
    </script>
